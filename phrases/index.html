<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#fff9f2"/>
  <title>Browse Phrases — Mon Petit Français</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../shared/style.css"/>
  <script src="../shared/categories.js"></script>
  <style>
    /* ── GRID PAGE ───────────────────────────── */
    #page-grid {
      padding: 60px 20px 100px;
      max-width: 900px;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin-bottom: 44px;
    }
    .page-header .eyebrow {
      font-size: 0.78rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--accent);
      font-weight: 300; margin-bottom: 14px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 400; line-height: 1.15;
      color: var(--ink); margin-bottom: 14px;
    }
    .page-header h1 em { font-style: italic; color: var(--accent); }
    .page-header p {
      font-size: 0.97rem; color: var(--muted); font-weight: 300;
      max-width: 420px; margin: 0 auto; line-height: 1.75;
    }

    /* Topic card grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--warm-white);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 24px 16px 20px;
      cursor: pointer;
      transition: all 0.22s ease;
      text-align: center;
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      animation: fadeUp 0.4s ease both;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: var(--accent);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.22s ease;
    }
    .card:hover { border-color: var(--accent-light); box-shadow: 0 4px 24px rgba(196,113,74,0.10); transform: translateY(-2px); }
    .card:hover::after { transform: scaleX(1); }
    .card:active { transform: translateY(0); }
    .card-icon  { font-size: 1.7rem; margin-bottom: 10px; display: block; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
    .card-sub   { font-size: 0.76rem; color: var(--muted); font-weight: 300; }

    /* ── INNER (TOPIC DETAIL) PAGE ───────────── */
    #page-inner { display: none; }
    #page-inner.active { display: block; }

    .inner-body {
      max-width: 740px;
      width: 100%;
      margin: 0 auto;
      padding: 36px 16px 100px;
      animation: fadeUp 0.35s ease both;
    }

    /* ── MOBILE ───────────────────────────────── */
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .card { padding: 18px 10px 14px; }
    }

    /* Staggered card animation */
    .card:nth-child(1)  { animation-delay: 0.04s }
    .card:nth-child(2)  { animation-delay: 0.08s }
    .card:nth-child(3)  { animation-delay: 0.12s }
    .card:nth-child(4)  { animation-delay: 0.16s }
    .card:nth-child(5)  { animation-delay: 0.20s }
    .card:nth-child(6)  { animation-delay: 0.24s }
    .card:nth-child(7)  { animation-delay: 0.28s }
    .card:nth-child(8)  { animation-delay: 0.32s }
    .card:nth-child(9)  { animation-delay: 0.36s }
    .card:nth-child(10) { animation-delay: 0.40s }
    .card:nth-child(11) { animation-delay: 0.44s }
    .card:nth-child(12) { animation-delay: 0.48s }
  </style>
</head>
<body>

<!-- GRID PAGE -->
<div id="page-grid">
  <div class="page-header">
    <div class="eyebrow">Pour ma chère ♡</div>
    <h1>Parcourir les<br/><em>Phrases</em></h1>
    <p>Choose a topic to explore simple phrases and build your confidence one conversation at a time.</p>
  </div>
  <div class="divider"></div>
  <div class="grid" id="card-grid"></div>
</div>

<!-- INNER TOPIC PAGE -->
<div id="page-inner">
  <nav class="inner-nav">
    <button class="back-btn" id="back-btn" onclick="goBack()">All topics</button>
  </nav>
  <!-- speed bar injected here by JS -->
  <div class="inner-body" id="inner-body"></div>
</div>

<footer class="site-footer">
  <span>Need a word?</span>
  <a href="https://translate.google.com/?sl=en&tl=fr&op=translate" target="_blank" rel="noopener">Open Google Translate ↗</a>
</footer>

<script src="../shared/nav.js"></script>
<script src="../shared/audio.js"></script>
<script type="module">
  import phrasesData from '../shared/phrases-data.js';
  window.phrasesData = phrasesData;
  buildGrid();
</script>
<script>
/* ── GLOBAL STATE & INIT ── */
let _activeCategory = null;

document.addEventListener('DOMContentLoaded', () => {
  if (window.enableOptions) {
    window.enableOptions(['SPEED', 'LEVEL']);
  }

  window.addEventListener('mpfSettingsChanged', () => {
    if (_activeCategory) {
      openCategory(_activeCategory);
    } else {
      buildGrid();
    }
  });
});

/* ── GRID: SHOW CATEGORIES ── */
function buildGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  
  // Get unique categories from the flat phrasesData
  const categories = [...new Set(window.phrasesData.map(p => p.category))].sort();
  // Define levels for filtering logic
    const levelIds = ["A0", "A1", "A2", "B1", "B2", "C1"];
    const selectedIdx = levelIds.indexOf(userSettings.level);
    const isStrict = userSettings.strictLevel;
  categories.forEach(cat => {
    const meta = window.CATEGORIES[cat];
    const count = window.phrasesData.filter(p => {
      if (p.category !== cat) return false;
      const itemIdx = levelIds.indexOf(p.lvl || "A0");
      return isStrict ? itemIdx === selectedIdx : itemIdx <= selectedIdx;
    }).length;   
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <span class="card-icon">${meta.icon}</span>
      <div class="card-title">${meta.sub}</div>
      <div class="card-sub">${count} phrases</div>
    `;
    card.addEventListener('click', () => openCategory(cat));
    grid.appendChild(card);
  });
}

/* ── DETAIL: RENDER FILTERED PHRASES ── */
function openCategory(catName) {
  _activeCategory = catName;
  const pageInner = document.getElementById('page-inner');
  const body = document.getElementById('inner-body');
  const meta = window.CATEGORIES[catName];

  // 1. Filter data by Category AND Global Level
  const levelIds = ["A0", "A1", "A2", "B1", "B2", "C1"];
  const selectedIdx = levelIds.indexOf(userSettings.level);
  const isStrict = userSettings.strictLevel;

  const filtered = window.phrasesData.filter(p => {
    if (p.category !== catName) return false;
    const itemIdx = levelIds.indexOf(p.lvl || "A0");
    return isStrict ? itemIdx === selectedIdx : itemIdx <= selectedIdx;
  });

  // 2. Group by Subcategory
  const groups = {};
  filtered.forEach(p => {
    const sub = p.subcategory || "General";
    if (!groups[sub]) groups[sub] = [];
    groups[sub].push(p);
  });

  // 3. Build HTML
  let html = `
    <div class="inner-header">
      <div class="eyebrow">${meta.icon} &nbsp; Phrases</div>
      <h2>${meta.title.replace(/(\S+)\s*$/, '<em>$1</em>')}</h2>
      <p>${meta.desc}</p>
    </div>
  `;

  Object.keys(groups).forEach(sub => {
    html += `<div class="section-label">${sub}</div>`;
    html += `
      <div class="phrase-header">
        <span>French</span><span>English</span><span>Sounds like</span>
      </div>
      <div class="phrase-list">
    `;
    
    groups[sub].forEach(p => {
      html += `
        <div class="phrase-row" data-fr="${encodeURIComponent(p.fr)}">
          <div class="phrase-fr">${p.fr}</div>
          <div class="phrase-en">${p.en}</div>
          <div class="phrase-ph">${p.ph}</div>
          ${p.note ? `<div class="phrase-note">💡 ${p.note}</div>` : ''}
        </div>
      `;
    });
    html += `</div>`;
  });

  body.innerHTML = filtered.length > 0 ? html : `<p class="muted">No phrases found for this rank.</p>`;

  // 4. Attach Play Buttons
  body.querySelectorAll('.phrase-row').forEach(row => {
    const text = decodeURIComponent(row.dataset.fr);
    const btn = Audio.buildPlayBtn(text);
    row.insertBefore(btn, row.querySelector('.phrase-fr'));
  });

  document.getElementById('page-grid').style.display = 'none';
  pageInner.classList.add('active');
  window.scrollTo(0, 0);
  // Use the global nav link to go back
  if (window.setNavContextLink) {
    window.setNavContextLink(goBack, "All Categories");
  }

  document.getElementById('page-grid').style.display = 'none';
  pageInner.classList.add('active');
  window.scrollTo(0, 0);
}

function goBack() {
 _activeCategory = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('page-inner').classList.remove('active');
  document.getElementById('page-grid').style.display = 'block';
  
  // Ensure the link is hidden when returning to grid
  if (window.setNavContextLink) {
    window.setNavContextLink(null);
  window.scrollTo(0, 0);
}
  buildGrid();
</script>
</body>
</html>
