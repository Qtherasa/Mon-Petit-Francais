<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#fff9f2"/>
  <title>Vocabulaire — Mon Petit Français</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../shared/style.css"/>
  <script src="../shared/categories.js"></script>
  <style>

    /* ── GRID PAGE ───────────────────────────── */
    #page-grid {
      padding: 40px 20px 80px; /* Reduced top/bottom padding */
      max-width: 1200px;        /* Increased from 900px to use 2/3 screen */
      margin: 0 auto;
    }
    
    /* Topic card grid */
    .grid {
      display: grid;
      /* Reduced min-width from 180px to 145px to fit 6-8 cards per row on desktop */
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); 
      gap: 12px; /* Slightly tighter gap */
    }
    
    .card {
      background: var(--warm-white);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 16px 12px 14px; /* Reduced from 24px/16px to shrink height */
      cursor: pointer;
      transition: all 0.22s ease;
      text-align: center;
      position: relative; 
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      animation: fadeUp 0.4s ease both;
    }
    
    .card-icon  { 
      font-size: 1.4rem; /* Slightly smaller icon */
      margin-bottom: 6px; 
      display: block; 
    }
    
    .card-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 0.95rem; /* Slightly smaller text */
      font-weight: 600; 
      color: var(--ink); 
      margin-bottom: 3px; 
    }
    
    .card-sub { 
      font-size: 0.72rem; 
      color: var(--muted); 
      font-weight: 300; 
    }
    @media (max-width: 480px) {
      .grid { 
        grid-template-columns: 1fr 1fr; 
        gap: 10px; 
      }
      .card { 
        padding: 14px 8px 12px; 
      }
      .card-icon { font-size: 1.2rem; }
    }
    
    #page-inner { display: none; padding-top: 40px; }
    #page-inner.active { display: block; }
    .inner-body { max-width: 740px; margin: 0 auto; padding: 0 16px 100px; }

    /* ── MODAL STYLING ────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(28, 25, 23, 0.6); z-index: 2500; backdrop-filter: blur(4px);
    }
    .modal-content {
      background: var(--warm-white); width: 90%; max-width: 480px;
      margin: 10vh auto; padding: 32px; border-radius: 12px;
      position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px; background: none;
      border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted);
    }
    
    .opt-group { margin-bottom: 24px; border-bottom: 1px solid var(--line); padding-bottom: 20px; }
    .opt-group:last-child { border: none; }
    .opt-label { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 12px; display: block; }
    
    .lvl-header { display: flex; justify-content: space-between; align-items: baseline; }
    .lvl-tag { color: var(--accent); font-weight: 700; font-size: 0.85rem; }
    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    
    .jump-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .jump-grid button { 
      font-size: 0.7rem; padding: 10px 4px; border: 1px solid var(--line); 
      border-radius: 4px; background: white; cursor: pointer;
    }
    .sub-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .sub-tag { 
      text-decoration: none; color: var(--accent); font-size: 0.75rem; 
      padding: 4px 8px; border: 1px dashed var(--accent-light); border-radius: 4px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .card { background: var(--warm-white); border: 1px solid var(--line); border-radius: 6px; padding: 24px 16px 20px; cursor: pointer; transition: all 0.22s ease; text-align: center; animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

<div id="options-modal" class="modal-overlay" onclick="handleOutsideClick(event)">
  <div class="modal-content">
    <button class="modal-close" onclick="toggleVocabOptions()">✕</button>
    <div class="opt-group">
      <div class="lvl-header">
        <span class="opt-label">Experience Level</span>
        <span id="lvl-display" class="lvl-tag">Legend</span>
      </div>
      <input type="range" id="lvl-slider" min="0" max="5" value="5" step="1">
      <label style="display:flex; align-items:center; gap:8px; margin-top:12px; font-size:0.8rem; color:var(--muted); cursor:pointer;">
        <input type="checkbox" id="strict-mode"> Show only this level
      </label>
    </div>
    <div class="opt-group">
      <span class="opt-label">Jump to Category</span>
      <div id="jump-grid" class="jump-grid"></div>
    </div>
    <div class="opt-group" id="sub-jump-zone" style="display:none;">
      <span class="opt-label" style="font-size:0.9rem; color:var(--muted);">Jump to Sub-Topic</span>
      <div id="sub-links" class="sub-links"></div>
    </div>
    <div id="speed-mount"></div>
  </div>
</div>

<div id="page-grid">
  <div class="page-header">
    <div class="eyebrow">Pour ma chère ♡</div>
    <h1>Le<br/><em>Vocabulaire</em></h1>
    <p>Browse words by category, or use the Options menu to filter by difficulty.</p>
  </div>
  <div class="divider"></div>
  <div class="grid" id="card-grid"></div>
</div>

<div id="page-inner">
  <div class="inner-body" id="inner-body"></div>
</div>

<script src="../shared/nav.js"></script>
<script src="../shared/audio.js"></script>
<script type="module">
  import vocabData from '../shared/vocab-data.js';
  window.vocabData = vocabData;
  initVocab();
</script>

<script>
  const lvlLabels = ["New Recruit", "Wayfinder", "Explorer", "Pathfinder", "Vanguard", "Legend"];
  const lvlValues = ["A0", "A1", "A2", "B1", "B2", "C1+"];
  let currentContext = { type: 'grid', category: null };

  window.toggleVocabOptions = function() {
    const modal = document.getElementById('options-modal');
    const isOpening = modal.style.display !== 'block';
    modal.style.display = isOpening ? 'block' : 'none';
    if (isOpening) populateJumpMenu();
  };

  function handleOutsideClick(e) {
    if (e.target.id === 'options-modal') toggleVocabOptions();
  }

  function getFilteredData(data) {
    const selectedIdx = parseInt(document.getElementById('lvl-slider').value);
    const isStrict = document.getElementById('strict-mode').checked;
    return data.filter(item => {
      const itemIdx = lvlValues.indexOf(item.lvl || "A0");
      return isStrict ? itemIdx === selectedIdx : itemIdx <= selectedIdx;
    });
  }

  function populateJumpMenu() {
    const grid = document.getElementById('jump-grid');
    const cats = [...new Set(window.vocabData.map(v => v.category))].sort();
    let html = `<button onclick="handleJump('grid')">← Grid</button>`;
    html += `<button onclick="handleJump('all')">Full List</button>`;
    cats.forEach(c => html += `<button onclick="handleJump('${c}')">${c.charAt(0).toUpperCase() + c.slice(1)}</button>`);
    grid.innerHTML = html;

    const subZone = document.getElementById('sub-jump-zone');
    if (currentContext.type === 'cat') {
      subZone.style.display = 'block';
      const items = window.vocabData.filter(v => v.category === currentContext.category);
      const subcats = [...new Set(items.map(v => v.subcategory || 'General'))];
      document.getElementById('sub-links').innerHTML = subcats.map(s => 
        `<a href="#section-${s.toLowerCase().replace(/\s+/g,'-')}" class="sub-tag" onclick="toggleVocabOptions()"># ${s}</a>`
      ).join('');
    } else { subZone.style.display = 'none'; }
  }

  function handleJump(target) {
    toggleVocabOptions();
    if (target === 'grid') goBack();
    else if (target === 'all') openAll();
    else openCategory(target);
  }

  // ── INIT ─────────────────────────────────────
  function initVocab() {
      const grid = document.getElementById('card-grid');
      const categories = [...new Set(window.vocabData.map(v => v.category))].sort();
  
      // 1. Create the "All Vocab" card first (Special case)
      let html = `
        <div class="card" onclick="openAll()">
          <span class="card-icon">📚</span>
          <div class="card-title">Tout le <em>Vocabulaire</em></div>
          <div class="card-sub">${window.vocabData.length} words total</div>
        </div>
      `;
  
      // 2. Add the rest using your new shared CATEGORIES logic
      categories.forEach(cat => {
        html += renderCategoryCard(cat);
      });
  
      grid.innerHTML = html;
    }

  function openCategory(cat) {
    currentContext = { type: 'cat', category: cat };
    const filtered = getFilteredData(window.vocabData.filter(v => v.category === cat));
    let html = `<div class="inner-header"><h2>${cat}</h2><p>${filtered.length} words visible.</p></div>`;
    const groups = new Map();
    filtered.forEach(v => {
      const s = v.subcategory || 'General';
      if(!groups.has(s)) groups.set(s, []);
      groups.get(s).push(v);
    });
    groups.forEach((items, sub) => html += buildVocabSection(sub, items));
    renderInner(html);
  }

  function openAll() {
    currentContext = { type: 'all', category: null };
    const filtered = getFilteredData(window.vocabData);
    const cats = [...new Set(filtered.map(v => v.category))].sort();
    let html = `<div class="inner-header"><h2>All Vocab</h2></div>`;
    cats.forEach(cat => {
      const items = filtered.filter(v => v.category === cat);
      html += buildVocabSection(cat, items);
    });
    renderInner(html);
  }

  function buildVocabSection(label, items) {
    if (items.length === 0) return '';
    const id = `section-${label.toLowerCase().replace(/\s+/g,'-')}`;
    let html = `<div class="section-label" id="${id}">${label}</div><div class="phrase-list">`;
    items.forEach(v => {
      const spoken = v.article ? `${v.article} ${v.fr}` : v.fr;
      html += `<div class="phrase-row" data-spoken="${encodeURIComponent(spoken)}">
        <div class="phrase-fr">${v.article ? `<span class="vocab-article">${v.article}</span> ` : ''}${v.fr}</div>
        <div class="phrase-en">${v.en}</div>
        <div class="phrase-ph">${v.ph}</div>
        ${v.note ? `<div class="phrase-note">💡 ${v.note}</div>` : ''}
      </div>`;
    });
    return html + `</div>`;
  }

  function renderInner(html) {
    const body = document.getElementById('inner-body');
    const mount = document.getElementById('speed-mount');
    mount.innerHTML = '';
    Audio.buildSpeedBar(mount, 'Playback speed');
    body.innerHTML = html;
    body.querySelectorAll('.phrase-row').forEach(row => {
      const btn = Audio.buildPlayBtn(decodeURIComponent(row.dataset.spoken));
      row.insertBefore(btn, row.querySelector('.phrase-fr'));
    });
    document.getElementById('page-grid').style.display = 'none';
    document.getElementById('page-inner').classList.add('active');
    window.scrollTo(0, 0);
  }

  function goBack() {
    document.getElementById('page-inner').classList.remove('active');
    document.getElementById('page-grid').style.display = 'block';
    currentContext = { type: 'grid', category: null };
  }

  function refreshView() {
    if (currentContext.type === 'cat') {
      openCategory(currentContext.category);
    } else if (currentContext.type === 'all') {
      openAll();
    }
  }
  function renderCategoryCard(catName) {
      const meta = window.CATEGORIES[catName]; // Uses the Proxy from shared/categories.js
      const items = window.vocabData.filter(v => v.category === catName);
      
      return `
          <div class="card" onclick="openCategory('${catName}')">
              <span class="card-icon">${meta.icon}</span>
              <div class="card-title">${meta.title}</div>
              <div class="card-sub">${items.length} words</div>
          </div>
      `;
  }
  document.getElementById('lvl-slider').addEventListener('input', (e) => {
    document.getElementById('lvl-display').innerText = lvlLabels[e.target.value];
    if (currentContext.type !== 'grid') refreshView();
  });
  document.getElementById('strict-mode').addEventListener('change', refreshView);
</script>
</body>
</html>
