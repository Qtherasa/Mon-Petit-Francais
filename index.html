<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon Petit Français</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --warm-white: #fff9f2;
      --ink: #1a1612;
      --muted: #8a7f74;
      --accent: #c4714a;
      --accent-light: #f0ddd3;
      --line: #e8e0d5;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── PAGES ── */
    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }

    /* ── HOME ── */
    #home {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }
    #home.active { display: flex; }

    .home-header {
      text-align: center;
      margin-bottom: 56px;
    }
    .home-header .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .home-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 16px;
    }
    .home-header h1 em {
      font-style: italic;
      color: var(--accent);
    }
    .home-header p {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 48px;
      opacity: 0.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: var(--warm-white);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 28px 24px;
      cursor: pointer;
      transition: all 0.22s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.22s ease;
    }
    .card:hover {
      border-color: var(--accent-light);
      box-shadow: 0 4px 24px rgba(196,113,74,0.10);
      transform: translateY(-2px);
    }
    .card:hover::after { transform: scaleX(1); }

    .card-icon { font-size: 1.8rem; margin-bottom: 12px; display: block; }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* ── INNER PAGE ── */
    #inner {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }
    #inner.active { display: flex; }

    .inner-nav {
      padding: 24px 32px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: var(--warm-white);
    }
    .back-btn {
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: gap 0.15s;
    }
    .back-btn:hover { gap: 12px; }
    .back-btn::before { content: '←'; font-size: 1rem; }

    .inner-body {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .inner-header {
      margin-bottom: 40px;
    }
    .inner-header .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 300;
    }
    .inner-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 400;
      line-height: 1.2;
    }
    .inner-header h2 em { font-style: italic; color: var(--accent); }
    .inner-header p {
      margin-top: 12px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
    }

    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      margin-top: 40px;
      font-weight: 700;
    }

    .phrase-list { display: flex; flex-direction: column; gap: 1px; }

    .phrase-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .phrase-row:hover { box-shadow: 0 2px 12px rgba(196,113,74,0.10); }

    .phrase-fr, .phrase-en {
      padding: 14px 20px;
      font-size: 0.96rem;
      line-height: 1.5;
    }
    .phrase-fr {
      background: var(--warm-white);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--ink);
    }
    .phrase-en {
      background: var(--cream);
      color: var(--muted);
      font-weight: 300;
    }
    .phrase-note {
      grid-column: 1 / -1;
      background: var(--accent-light);
      padding: 8px 20px;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 400;
    }

    @media (max-width: 520px) {
      .phrase-row { grid-template-columns: 1fr; }
      .phrase-note { grid-column: 1; }
    }

    /* fade-in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.4s ease both; }
    .card:nth-child(1)  { animation-delay: 0.05s }
    .card:nth-child(2)  { animation-delay: 0.10s }
    .card:nth-child(3)  { animation-delay: 0.15s }
    .card:nth-child(4)  { animation-delay: 0.20s }
    .card:nth-child(5)  { animation-delay: 0.25s }
    .card:nth-child(6)  { animation-delay: 0.30s }
    .card:nth-child(7)  { animation-delay: 0.35s }
    .card:nth-child(8)  { animation-delay: 0.40s }
    .card:nth-child(9)  { animation-delay: 0.45s }
    .card:nth-child(10) { animation-delay: 0.50s }

    .inner-body { animation: fadeUp 0.35s ease both; }
  </style>
</head>

<!-- HOME PAGE -->
<section id="home" class="page active">

// Build home grid
const grid = document.getElementById('card-grid');
topics.forEach(topic => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="card-icon">${topic.icon}</span>
    <div class="card-title">${topic.title}</div>
    <div class="card-sub">${topic.sub}</div>
  `;
  card.addEventListener('click', () => openTopic(topic));
  grid.appendChild(card);
});

function openTopic(topic) {
  const body = document.getElementById('inner-body');

  let html = `
    <div class="inner-header">
      <div class="eyebrow">${topic.icon} &nbsp; Phrases</div>
      <h2>${topic.title.replace(/(\S+)\s*$/, '<em>$1</em>')}</h2>
      <p>${topic.desc}</p>
    </div>
  `;

  topic.sections.forEach(section => {
    html += `<div class="section-label">${section.label}</div>`;
    html += `<div class="phrase-list">`;
    section.phrases.forEach(p => {
      html += `
        <div class="phrase-row">
          <div class="phrase-fr">${p.fr}</div>
          <div class="phrase-en">${p.en}</div>
          ${p.note ? `<div class="phrase-note">💡 ${p.note}</div>` : ''}
        </div>
      `;
    });
    html += `</div>`;
  });

  body.innerHTML = html;

  document.getElementById('home').classList.remove('active');
  document.getElementById('inner').classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  document.getElementById('inner').classList.remove('active');
  document.getElementById('home').classList.add('active');
  window.scrollTo(0, 0);
}
</script>
